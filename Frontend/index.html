<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo-app</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #030d18;
      }

      .container {
        text-align: center;
        margin-top: 80px;
      }

      h1 {
        color: #fff;
        font-size: 40px;
      }

      input {
        padding: 10px;
        width: 250px;
        border: 1px solid #573333;
        border-radius: 8px;
      }

      button {
        padding: 10px 15px;
        margin-left: 10px;
        border: none;
        background: #4cafef;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #2196f3;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        background: #111;
        margin: 10px auto;
        padding: 10px;
        width: 300px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- ✅ Correct path for Vite -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
